name: Release Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build addon zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $repoRoot = Get-Location
          $addonName = Split-Path $repoRoot -Leaf
          $stageRoot = Join-Path $repoRoot 'build'
          $stageAddon = Join-Path $stageRoot $addonName
          $versionedZipPath = Join-Path $repoRoot "$addonName-$version.zip"
          $stableZipPath = Join-Path $repoRoot "$addonName.zip"

          if (Test-Path $stageRoot) {
            Remove-Item $stageRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $stageAddon | Out-Null

          Get-ChildItem -Path $repoRoot -Force | Where-Object {
            $_.Name -notin @('.git', '.github', '.idea', 'build')
          } | Copy-Item -Destination $stageAddon -Recurse -Force

          if (Test-Path $versionedZipPath) {
            Remove-Item $versionedZipPath -Force
          }

          if (Test-Path $stableZipPath) {
            Remove-Item $stableZipPath -Force
          }

          Compress-Archive -Path $stageAddon -DestinationPath $versionedZipPath -Force
          Copy-Item -Path $versionedZipPath -Destination $stableZipPath -Force

      - name: Build release notes from changelog
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $changelogPath = Join-Path (Get-Location) 'CHANGELOG.md'
          $content = Get-Content $changelogPath
          $startPattern = "^##\s+$([regex]::Escape($version))$"
          $startIndex = -1

          for ($i = 0; $i -lt $content.Count; $i++) {
            if ($content[$i] -match $startPattern) {
              $startIndex = $i
              break
            }
          }

          if ($startIndex -lt 0) {
            throw "Could not find changelog section for version $version"
          }

          $notes = New-Object System.Collections.Generic.List[string]
          for ($i = $startIndex + 1; $i -lt $content.Count; $i++) {
            if ($content[$i] -match '^##\s+') {
              break
            }
            $notes.Add($content[$i])
          }

          $notesPath = Join-Path (Get-Location) 'release-notes.md'
          Set-Content -Path $notesPath -Value ($notes -join "`n")

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OthTips-*.zip
            OthTips.zip
          body_path: release-notes.md
